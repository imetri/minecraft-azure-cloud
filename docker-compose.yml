name: minecraft-paper

services:
  minecraft:
    image: itzg/minecraft-server:2026.7.0-java21
    container_name: minecraft-paper

    restart: unless-stopped
    tty: true
    stdin_open: true
    stop_grace_period: 2m

    ports:
      - "25565:25565/tcp"

    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.11"

      INIT_MEMORY: "2G"
      MAX_MEMORY: "4G"

      TZ: "Asia/Manila"
      ONLINE_MODE: "TRUE"
      MODE: "survival"
      DIFFICULTY: "normal"
      MAX_PLAYERS: "10"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"

      MOTD: "Minecraft Azure Cloud | Paper 1.21.11"

      ENABLE_RCON: "TRUE"
      RCON_PASSWORD_FILE: "/run/secrets/rcon_password"

    volumes:
      - /srv/minecraft/data:/data

    secrets:
      - rcon_password

    mem_limit: 5g

    healthcheck:
      test: mc-health
      start_period: 2m
      interval: 30s
      timeout: 10s
      retries: 10

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  rcon_password:
    file: ./secrets/rcon_password.txt